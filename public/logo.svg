<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <rect width="200" height="200" fill="#080808"/>

  <!-- Shackle arch (open on right side) -->
  <path d="M 56 95 L 56 58 C 56 28 144 28 144 58 L 144 76"
        stroke="#3de09b" stroke-width="24" stroke-linecap="round" fill="none"/>

  <!-- Lock body -->
  <rect x="28" y="90" width="126" height="96" rx="22" fill="#3de09b"/>

  <!-- Keyhole circle -->
  <circle cx="91" cy="128" r="16" fill="#080808"/>
  <!-- Keyhole slot -->
  <rect x="84" y="138" width="14" height="22" rx="4" fill="#080808"/>

  <!-- Pixel accent (staircase from bottom-right of lock body) -->
  <rect x="140" y="154" width="18" height="18" rx="4" fill="#3de09b"/>
  <rect x="158" y="172" width="18" height="18" rx="4" fill="#3de09b"/>
  <rect x="158" y="190" width="18" height="10" rx="4" fill="#3de09b"/>
</svg>
